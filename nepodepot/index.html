<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nepo Depot</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── DESIGN TOKENS ───────────────────────────────────────────────────── */
    :root {
      --bg:          #0e0d0b;
      --surface:     #171612;
      --surface2:    #1f1e1a;
      --border:      #2e2c26;
      --gold:        #c9a84c;
      --gold-dim:    #7a6330;
      --text:        #e8e4d8;
      --text-dim:    #7a7670;
      --text-muted:  #4a4840;

      /*
       * Tier + edge colors — SINGLE SOURCE OF TRUTH.
       * Also in JS constants and legend HTML. Change in all three places.
       */
      --tier-silver:  #9badb7;
      --tier-dynasty: #c9a84c;
      --tier-locked:  #d4704a;
      --tier-blood:   #9b3a3a;
      --tier-founder: #5a6a5a;

      --header-h:   64px;
      --controls-w: 170px;
      --sidebar-w:  340px;
    }

    /* ── RESET ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── HEADER ──────────────────────────────────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem 0 1rem;
      z-index: 200;
    }

    .site-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: -0.02em;
    }

    .site-tagline {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.1rem;
    }

    .header-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.64rem;
      color: var(--text-muted);
    }

    /* ── PAGE — THREE COLUMN GRID ────────────────────────────────────────── */
    .page {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0; bottom: 0;
      display: grid;
      grid-template-columns: var(--controls-w) 1fr var(--sidebar-w);
    }

    /* ── CONTROLS COLUMN ─────────────────────────────────────────────────── */
    /*
     * Left column. Uses flex-column so children stack top-to-bottom.
     * No scrolling needed here — the dynasty selector is a native <select>
     * which handles its own scrolling natively at the OS level.
     */
    .controls-col {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      padding: 1rem 0.75rem;
      gap: 0.5rem;
      overflow: hidden;
    }

    /* Section label above each filter group */
    .filter-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
    }

    /* ── INDUSTRY TOGGLE BUTTONS — multi-select ──────────────────────────── */
    .industry-filters {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .filter-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.28rem 0.6rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 2px;
      text-align: left;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      width: 100%;
    }

    .filter-btn:hover  { border-color: var(--gold-dim); color: var(--text); }
    .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }

    .controls-divider {
      height: 1px;
      background: var(--border);
      margin: 0.2rem 0;
      flex-shrink: 0;
    }

    /* ── DYNASTY SELECT — native dropdown ────────────────────────────────── */
    /*
     * Native <select> — handles scroll, keyboard nav, and any list length
     * natively at the OS level. No CSS scroll tricks required.
     * Styled to match the site aesthetic.
     */
    .dynasty-select {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--surface);
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.3rem 0.5rem;
      width: 100%;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: border-color 0.15s, color 0.15s;
    }

    .dynasty-select:hover  { border-color: var(--gold-dim); color: var(--text); }
    .dynasty-select:focus  { border-color: var(--gold); color: var(--text); outline: none; }

    /* Wrapper for the select + custom arrow */
    .dynasty-select-wrap {
      position: relative;
    }

    .dynasty-select-wrap::after {
      content: '▾';
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.6rem;
      pointer-events: none;
    }

    /* ── LEGEND ──────────────────────────────────────────────────────────── */
    /*
     * Sits below the dynasty selector.
     * Dot/line hex values must match JS TIER_COLORS and EDGE_COLORS exactly.
     */
    .legend {
      margin-top: auto; /* push to bottom of column */
      border-top: 1px solid var(--border);
      padding-top: 0.65rem;
    }

    .legend-section        { margin-bottom: 0.45rem; }
    .legend-section:last-child { margin-bottom: 0; }

    .legend-section h4 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.54rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.28rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.18rem;
    }

    .legend-item span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-dim);
    }

    .legend-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-line { width: 16px; height: 2px; flex-shrink: 0; border-radius: 1px; }

    /* ── SEARCH BOX ─────────────────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .search-input {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.3rem 0.5rem 0.3rem 1.6rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--gold); }

    .search-icon {
      position: absolute;
      left: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.65rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-results {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      z-index: 100;
      max-height: 280px;
      overflow-y: auto;
      display: none;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .search-results.open { display: block; }

    .search-result-item {
      padding: 0.45rem 0.7rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover     { background: rgba(201,168,76,0.07); }

    .result-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--text);
      margin-bottom: 0.08rem;
    }

    .result-name mark {
      background: rgba(201,168,76,0.25);
      color: var(--gold);
      border-radius: 1px;
    }

    .result-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .result-type-badge {
      display: inline-block;
      font-size: 0.5rem;
      padding: 0.08rem 0.3rem;
      border-radius: 2px;
      margin-right: 0.3rem;
      vertical-align: middle;
    }

    .result-type-person  { background: rgba(155,173,183,0.15); color: var(--tier-silver); }
    .result-type-dynasty { background: rgba(201,168,76,0.15);  color: var(--gold); }

    .search-no-results {
      padding: 0.6rem 0.7rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── GRAPH PANEL ─────────────────────────────────────────────────────── */
    .graph-panel {
      position: relative;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    #graph-svg { width: 100%; height: 100%; display: block; }

    .node circle       { stroke-width: 1.5px; cursor: pointer; }
    .node circle:hover { stroke-width: 2.5px; }
    .link              { stroke-opacity: 0.5; stroke-width: 1.5px; }

    /* ── SIDEBAR ─────────────────────────────────────────────────────────── */
    .sidebar { display: flex; flex-direction: column; overflow: hidden; }

    /* ── PERSON PANEL ────────────────────────────────────────────────────── */
    .person-panel {
      flex-shrink: 0;
      padding: 1.4rem;
      border-bottom: 1px solid var(--border);
      min-height: 170px;
      max-height: 52%;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .person-panel.empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .empty-icon   { font-size: 1.8rem; opacity: 0.2; margin-bottom: 0.4rem; }
    .empty-prompt {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .person-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }

    .person-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.61rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.55rem;
    }

    .tier-badge {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
      margin-bottom: 0.55rem;
    }

    .tier-silver_spoon  { background: rgba(155,173,183,0.12); color: var(--tier-silver);  border: 1px solid rgba(155,173,183,0.3); }
    .tier-dynasty_core  { background: rgba(201,168,76,0.12);  color: var(--tier-dynasty); border: 1px solid rgba(201,168,76,0.3);  }
    .tier-legacy_locked { background: rgba(212,112,74,0.12);  color: var(--tier-locked);  border: 1px solid rgba(212,112,74,0.3);  }
    .tier-bloodline     { background: rgba(155,58,58,0.12);   color: var(--tier-blood);   border: 1px solid rgba(155,58,58,0.3);   }
    .tier-founding      { background: rgba(90,106,90,0.12);   color: #8aaa8a;             border: 1px solid rgba(90,106,90,0.3);   }

    .person-bio { font-size: 0.8rem; color: var(--text-dim); line-height: 1.65; margin-bottom: 0.85rem; }

    .first-break {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      padding: 0.65rem;
      margin-bottom: 0.65rem;
    }

    .first-break h4 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.56rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
      margin-bottom: 0.3rem;
    }

    .break-title      { font-family: 'Playfair Display', serif; font-size: 0.88rem; color: var(--text); margin-bottom: 0.12rem; }
    .break-role       { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--text-dim); margin-bottom: 0.3rem; }
    .break-connection { font-size: 0.76rem; color: var(--text-dim); line-height: 1.5; }

    .person-industries { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-bottom: 0.45rem; }

    .industry-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.13rem 0.4rem;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 2px;
    }

    .external-links { display: flex; gap: 0.4rem; margin-top: 0.5rem; }

    .ext-link {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .ext-link:hover { color: var(--gold); border-color: var(--gold-dim); }

    /* ── DYNASTY CARDS ───────────────────────────────────────────────────── */
    .dynasties-section {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0.9rem 1.1rem 2rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.65rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }

    .dynasty-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.8rem;
      margin-bottom: 0.5rem;
      transition: border-color 0.15s;
    }

    .dynasty-card:hover { border-color: var(--gold-dim); }

    .dynasty-card-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.12rem;
    }

    .dynasty-card-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.56rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .dynasty-card-summary { font-size: 0.76rem; color: var(--text-dim); line-height: 1.55; }

    .dynasty-members-row { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.45rem; }

    .member-chip {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      padding: 0.11rem 0.38rem;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 2px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .member-chip:hover { color: var(--gold); border-color: var(--gold-dim); }

    /* ── TOOLTIP ─────────────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.5rem 0.8rem;
      pointer-events: none;
      z-index: 1000;
      display: none;
      max-width: 200px;
    }

    #tooltip .tt-name { font-family: 'Playfair Display', serif; font-size: 0.85rem; color: var(--text); margin-bottom: 0.08rem; }
    #tooltip .tt-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.56rem; color: var(--text-muted); text-transform: uppercase; }

    /* ── LOADING ─────────────────────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; gap: 1rem;
    }

    .load-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--gold); }
    .load-sub   { font-family: 'IBM Plex Mono', monospace; font-size: 0.64rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }

    .load-bar {
      width: 200px; height: 1px; background: var(--border);
      position: relative; overflow: hidden;
    }
    .load-bar::after {
      content: ''; position: absolute;
      top: 0; left: -50%; width: 50%; height: 100%;
      background: var(--gold);
      animation: loadslide 1s ease-in-out infinite;
    }
    @keyframes loadslide { 0% { left: -50%; } 100% { left: 150%; } }
  </style>
</head>
<body>

<div id="loading">
  <div class="load-title">Nepo Depot</div>
  <div class="load-bar"></div>
  <div class="load-sub">Loading the family tree</div>
</div>

<header>
  <div>
    <div class="site-name">Nepo Depot</div>
    <div class="site-tagline">Family connections in entertainment</div>
  </div>
  <div class="header-meta" id="header-meta">—</div>
</header>

<div class="page">

  <!--
    CONTROLS COLUMN
    Industry filters: toggle buttons, multi-select.
    Dynasty filter: native <select> — handles any list length,
    scrolls natively, zero CSS required.
    Legend: pushed to bottom with margin-top: auto.
  -->
  <div class="controls-col">

    <div class="filter-label">Industry</div>
    <div class="industry-filters" id="industry-filters"></div>

    <div class="controls-divider"></div>

    <div class="filter-label">Family</div>
    <div class="dynasty-select-wrap">
      <select class="dynasty-select" id="dynasty-select">
        <option value="">All Families</option>
      </select>
    </div>

    <!-- Search box -->
    <div class="controls-divider"></div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input
        class="search-input"
        id="search-input"
        type="text"
        placeholder="Search people or families…"
        autocomplete="off"
      />
      <div class="search-results" id="search-results"></div>
    </div>

    <!--
      LEGEND — margin-top:auto pushes it to the bottom of the flex column.
      Hex values match JS TIER_COLORS and EDGE_COLORS — keep in sync.
    -->
    <div class="legend">
      <div class="legend-section">
        <h4>Tier</h4>
        <div class="legend-item" title="One parent in the entertainment industry"><div class="legend-dot" style="background:#9badb7"></div><span>Silver Spoon</span></div>
        <div class="legend-item" title="Both parents are established entertainers"><div class="legend-dot" style="background:#c9a84c"></div><span>Dynasty Core</span></div>
        <div class="legend-item" title="Parent plus at least one other family member in the industry"><div class="legend-dot" style="background:#d4704a"></div><span>Legacy Locked</span></div>
        <div class="legend-item" title="Three or more family members across multiple generations"><div class="legend-dot" style="background:#9b3a3a"></div><span>Bloodline</span></div>
        <div class="legend-item" title="The originating generation — no famous parents themselves"><div class="legend-dot" style="background:#5a6a5a"></div><span>Founding Gen</span></div>
      </div>
      <div class="legend-section">
        <h4>Relationship</h4>
        <div class="legend-item"><div class="legend-line" style="background:#c9a84c"></div><span>Parent / Child</span></div>
        <div class="legend-item"><div class="legend-line" style="background:#6a9bb5"></div><span>Sibling</span></div>
        <div class="legend-item"><div class="legend-line" style="background:#9b6aaa"></div><span>Spouse / Partner</span></div>
      </div>
    </div>

  </div>

  <!-- GRAPH -->
  <div class="graph-panel">
    <svg id="graph-svg"></svg>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="person-panel empty" id="person-panel">
      <div class="empty-icon">◈</div>
      <div class="empty-prompt">Select a node to view profile</div>
    </div>
    <div class="dynasties-section">
      <div class="section-label">Dynasties</div>
      <div id="dynasty-cards"></div>
    </div>
  </div>

</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-meta" id="tt-meta"></div>
</div>

<script>
'use strict';

// =============================================================================
// COLOR CONSTANTS
// Single source of truth. Duplicated in legend HTML — keep in sync.
// =============================================================================

const TIER_COLORS = {
  silver_spoon:  '#9badb7',
  dynasty_core:  '#c9a84c',
  legacy_locked: '#d4704a',
  bloodline:     '#9b3a3a',
};

const FOUNDER_COLOR = '#5a6a5a';

const EDGE_COLORS = {
  parent:  '#c9a84c',
  child:   '#c9a84c',
  sibling: '#6a9bb5',
  spouse:  '#9b6aaa',
  partner: '#9b6aaa',
};

const EDGE_DEFAULT = '#5a6a5a';

// =============================================================================
// HELPERS
// =============================================================================

const nodeColor = d => d.is_founding_gen ? FOUNDER_COLOR : (TIER_COLORS[d.nepo_tier] || FOUNDER_COLOR);
const edgeColor = rel => EDGE_COLORS[rel] || EDGE_DEFAULT;

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1).replace(/_/g, ' ') : '';
}

function normalizeArray(val) {
  if (Array.isArray(val)) return val;
  if (typeof val === 'string')
    return val.replace(/[{}]/g, '').split(',').map(s => s.trim()).filter(Boolean);
  return [];
}

function tierLabel(tier) {
  return {
    silver_spoon:  'Silver Spoon',
    dynasty_core:  'Dynasty Core',
    legacy_locked: 'Legacy Locked',
    bloodline:     'Bloodline',
  }[tier] || null;
}

// =============================================================================
// DATA
// =============================================================================

async function loadData() {
  const base = './data';
  const [persons, dynasties, graph, meta] = await Promise.all([
    fetch(`${base}/persons.json`).then(r => r.json()),
    fetch(`${base}/dynasties.json`).then(r => r.json()),
    fetch(`${base}/graph.json`).then(r => r.json()),
    fetch(`${base}/meta.json`).then(r => r.json()),
  ]);
  return { persons, dynasties, graph, meta };
}

// =============================================================================
// D3 FORCE GRAPH
// =============================================================================

function buildGraph(graphData, personsById, activeFilters, onNodeClick) {
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();

  const rect = document.getElementById('graph-svg').getBoundingClientRect();
  const W = rect.width  || 800;
  const H = rect.height || 700;

  const visibleIds = activeFilters.size === 0
    ? new Set(graphData.nodes.map(n => n.id))
    : new Set(graphData.nodes.filter(n => {
        const p    = personsById[n.id] || {};
        const inds = normalizeArray(p.industries || n.industries);
        const dyns = (p.dynasties || []).map(d => d.dynasty_slug);
        return [...activeFilters].some(f => {
          if (f.startsWith('industry:')) return inds.includes(f.slice(9));
          if (f.startsWith('dynasty:'))  return dyns.includes(f.slice(8));
          return false;
        });
      }).map(n => n.id));

  const nodes = graphData.nodes.filter(n => visibleIds.has(n.id)).map(n => ({ ...n }));
  const idSet = new Set(nodes.map(n => n.id));
  const links = graphData.edges
    .filter(e => idSet.has(e.source) && idSet.has(e.target))
    .map(e => ({ ...e }));

  const g = svg.append('g');

  svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', ev => g.attr('transform', ev.transform)));

  const sim = d3.forceSimulation(nodes)
    .force('link',      d3.forceLink(links).id(d => d.id).distance(130).strength(0.6))
    .force('charge',    d3.forceManyBody().strength(-340))
    .force('center',    d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(30));

  const link = g.append('g').selectAll('line').data(links).join('line')
    .attr('class', 'link')
    .attr('stroke', d => edgeColor(d.relationship_type));

  const node = g.append('g').selectAll('g').data(nodes).join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end',   (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  node.append('circle')
    .attr('r',            d => d.is_founding_gen ? 17 : 21)
    .attr('fill',         d => nodeColor(d))
    .attr('fill-opacity', 0.22)
    .attr('stroke',       d => nodeColor(d));

  node.append('text')
    .text(d => { const p = d.full_name.split(' '); return p.length >= 2 ? p[0][0] + p[p.length-1][0] : d.full_name[0]; })
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
    .style('font-family', "'IBM Plex Mono', monospace").style('font-size', '10px')
    .style('fill', d => nodeColor(d)).style('pointer-events', 'none');

  node.append('text')
    .text(d => d.full_name.split(' ').slice(-1)[0])
    .attr('y', 30).attr('text-anchor', 'middle')
    .style('font-family', "'IBM Plex Sans', sans-serif").style('font-size', '9px')
    .style('fill', 'var(--text-dim)').style('pointer-events', 'none');

  const tooltip = document.getElementById('tooltip');
  const ttName  = document.getElementById('tt-name');
  const ttMeta  = document.getElementById('tt-meta');

  node
    .on('mouseover', (ev, d) => {
      ttName.textContent = d.full_name;
      ttMeta.textContent = [d.birth_year, normalizeArray(d.industries).map(capitalize).join(' · ')].filter(Boolean).join(' — ');
      tooltip.style.display = 'block';
    })
    .on('mousemove', ev => {
      tooltip.style.left = (ev.clientX + 14) + 'px';
      tooltip.style.top  = (ev.clientY - 10) + 'px';
    })
    .on('mouseout',  () => { tooltip.style.display = 'none'; })
    .on('click',     (ev, d) => { const p = personsById[d.id]; if (p) onNodeClick(p); });

  sim.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// =============================================================================
// PERSON PANEL
// =============================================================================

function showPersonPanel(person, onDynastyClick) {
  const panel = document.getElementById('person-panel');
  panel.classList.remove('empty');

  const inds  = normalizeArray(person.industries)
    .map(i => `<span class="industry-tag">${capitalize(i)}</span>`).join('');

  const badge = person.is_founding_gen
    ? `<span class="tier-badge tier-founding">Founding Generation</span>`
    : person.nepo_tier
      ? `<span class="tier-badge tier-${person.nepo_tier}">${tierLabel(person.nepo_tier)}</span>`
      : '';

  const breakHtml = person.first_break ? `
    <div class="first-break">
      <h4>First Major Break</h4>
      <div class="break-title">${person.first_break.title} (${person.first_break.year})</div>
      <div class="break-role">${person.first_break.role || ''}</div>
      <div class="break-connection">${person.first_break.connection_notes || ''}</div>
    </div>` : '';

  const imdb = person.imdb_id
    ? `<a class="ext-link" href="https://www.imdb.com/name/${person.imdb_id}/" target="_blank" rel="noopener">IMDb ↗</a>` : '';
  const wiki = person.wikipedia_slug
    ? `<a class="ext-link" href="https://en.wikipedia.org/wiki/${person.wikipedia_slug}" target="_blank" rel="noopener">Wikipedia ↗</a>` : '';

  // Clickable dynasty chips — clicking snaps the graph to that family
  const dynastyChips = (person.dynasties || [])
    .map(d => `<span class="dynasty-chip" data-slug="${d.dynasty_slug}">${d.dynasty_name || d.dynasty_slug}</span>`)
    .join('');
  const dynastyRow = dynastyChips
    ? `<div class="person-dynasties">${dynastyChips}</div>` : '';

  panel.innerHTML = `
    <div class="person-name">${person.full_name}</div>
    <div class="person-meta">${[person.birth_year, person.birth_country].filter(Boolean).join(' · ')}</div>
    ${badge}
    <div class="person-industries">${inds}</div>
    ${dynastyRow}
    <div class="person-bio">${person.bio_summary || ''}</div>
    ${breakHtml}
    <div class="external-links">${imdb}${wiki}</div>
  `;

  // Wire dynasty chips after innerHTML is set
  if (onDynastyClick) {
    panel.querySelectorAll('.dynasty-chip').forEach(chip => {
      chip.addEventListener('click', () => onDynastyClick(chip.dataset.slug));
    });
  }
}

// =============================================================================
// FILTER CONTROLS
// =============================================================================

function buildFilters(dynasties, persons, onChange, onDynastySelect) {
  const industryEl = document.getElementById('industry-filters');
  const selectEl   = document.getElementById('dynasty-select');
  const active     = new Set();

  // Industry toggle buttons — multi-select
  const industries = [...new Set(persons.flatMap(p => normalizeArray(p.industries)))].sort();
  industries.forEach(ind => {
    const btn = document.createElement('button');
    btn.className   = 'filter-btn';
    btn.textContent = capitalize(ind);
    btn.addEventListener('click', () => {
      const key = 'industry:' + ind;
      active.has(key) ? active.delete(key) : active.add(key);
      btn.classList.toggle('active');
      onChange(new Set(active));
    });
    industryEl.appendChild(btn);
  });

  // Dynasty select — populate alphabetically
  [...dynasties]
    .sort((a, b) => a.dynasty_name.localeCompare(b.dynasty_name))
    .forEach(d => {
      const opt = document.createElement('option');
      opt.value       = d.slug;
      opt.textContent = d.dynasty_name;
      selectEl.appendChild(opt);
    });

  // Dynasty change handler — single-select (radio)
  selectEl.addEventListener('change', () => {
    [...active].filter(k => k.startsWith('dynasty:')).forEach(k => active.delete(k));
    if (selectEl.value) {
      active.add('dynasty:' + selectEl.value);
    } else {
      // Dropdown reset to "All" — clear active card highlight
      document.querySelectorAll('.dynasty-card').forEach(c => c.classList.remove('active'));
    }
    onChange(new Set(active));
  });

  return active;
}

// =============================================================================
// DYNASTY CARDS
// =============================================================================

function buildDynastyCards(dynasties, personsBySlug, onMemberClick) {
  const container = document.getElementById('dynasty-cards');
  container.innerHTML = '';

  [...dynasties]
    .sort((a, b) => a.dynasty_name.localeCompare(b.dynasty_name))
    .forEach(d => {
      const inds  = normalizeArray(d.industries).map(capitalize).join(' · ');
      const gen   = d.max_generation ? `${d.max_generation} gen` : '';
      const count = d.member_count   ? `${d.member_count} members` : '';
      const chips = (Array.isArray(d.members) ? d.members : [])
        .map(m => `<span class="member-chip" data-slug="${m.slug}">${m.full_name.split(' ')[0]}</span>`)
        .join('');

      const card = document.createElement('div');
      card.className    = 'dynasty-card';
      card.dataset.slug = d.slug;
      card.innerHTML = `
        <div class="dynasty-card-name">${d.dynasty_name}</div>
        <div class="dynasty-card-meta">${[inds, gen, count].filter(Boolean).join(' · ')}</div>
        <div class="dynasty-card-summary">${d.summary || ''}</div>
        <div class="dynasty-members-row">${chips}</div>
      `;

      card.querySelectorAll('.member-chip').forEach(chip => {
        chip.addEventListener('click', e => {
          e.stopPropagation();
          const person = personsBySlug[chip.dataset.slug];
          if (person) onMemberClick(person);
        });
      });

      container.appendChild(card);
    });
}

// =============================================================================
// SEARCH
// Searches loaded persons and dynasties. Highlights matched substring.
// Person click → showPersonPanel. Dynasty click → update select + redraw graph.
// =============================================================================

function highlightMatch(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return (
    text.slice(0, idx) +
    '<mark>' + text.slice(idx, idx + query.length) + '</mark>' +
    text.slice(idx + query.length)
  );
}

function buildSearch(persons, dynasties, personsBySlug, onPersonSelect, onDynastySelect) {
  const input   = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  let debounce  = null;

  function closeResults() {
    results.classList.remove('open');
    results.innerHTML = '';
  }

  function renderResults(query) {
    results.innerHTML = '';
    if (!query || query.length < 2) { closeResults(); return; }

    const q = query.toLowerCase();

    // Match persons
    const matchedPersons = persons
      .filter(p => p.full_name.toLowerCase().includes(q))
      .slice(0, 8);

    // Match dynasties
    const matchedDynasties = dynasties
      .filter(d => d.dynasty_name.toLowerCase().includes(q))
      .slice(0, 4);

    if (!matchedPersons.length && !matchedDynasties.length) {
      results.innerHTML = '<div class="search-no-results">No results found</div>';
      results.classList.add('open');
      return;
    }

    // Dynasty results first
    matchedDynasties.forEach(d => {
      const inds  = normalizeArray(d.industries).map(capitalize).join(' · ');
      const count = d.member_count ? `${d.member_count} members` : '';
      const item  = document.createElement('div');
      item.className = 'search-result-item';
      item.innerHTML = `
        <div class="result-name">
          <span class="result-type-badge result-type-dynasty">Dynasty</span>
          ${highlightMatch(d.dynasty_name, query)}
        </div>
        <div class="result-meta">${[inds, count].filter(Boolean).join(' · ')}</div>
      `;
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        onDynastySelect(d);
        input.value = '';
        closeResults();
      });
      results.appendChild(item);
    });

    // Person results
    matchedPersons.forEach(p => {
      const inds = normalizeArray(p.industries).map(capitalize).join(' · ');
      const meta = [p.birth_year, inds].filter(Boolean).join(' · ');
      const item = document.createElement('div');
      item.className = 'search-result-item';
      item.innerHTML = `
        <div class="result-name">
          <span class="result-type-badge result-type-person">Person</span>
          ${highlightMatch(p.full_name, query)}
        </div>
        <div class="result-meta">${meta}</div>
      `;
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        onPersonSelect(p);
        input.value = '';
        closeResults();
      });
      results.appendChild(item);
    });

    results.classList.add('open');
  }

  input.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => renderResults(input.value.trim()), 120);
  });

  input.addEventListener('focus', () => {
    if (input.value.trim().length >= 2) renderResults(input.value.trim());
  });

  // Close on outside click
  document.addEventListener('click', e => {
    if (!input.contains(e.target) && !results.contains(e.target)) closeResults();
  });

  // Keyboard nav
  input.addEventListener('keydown', e => {
    const items = [...results.querySelectorAll('.search-result-item')];
    const active = results.querySelector('.search-result-item:hover');
    if (e.key === 'Escape') { closeResults(); input.blur(); }
    if (e.key === 'Enter' && items.length) {
      (active || items[0]).dispatchEvent(new Event('mousedown'));
    }
  });
}

// =============================================================================
// INIT
// =============================================================================

async function init() {
  try {
    const { persons, dynasties, graph, meta } = await loadData();

    const personsById   = {};
    const personsBySlug = {};
    persons.forEach(p => { personsById[p.id] = p; personsBySlug[p.slug] = p; });

    document.getElementById('header-meta').textContent =
      `${meta.persons_exported} people · ${meta.dynasties_exported} dynasties`;

    let activeFilters = new Set();
    const dynastySelectEl = document.getElementById('dynasty-select');

    // Unified dynasty-snap: updates dropdown, filters, redraws graph
    // snapToDynasty — graph + dropdown + card highlight only.
    // Safe to call from selectPerson; does NOT touch the person panel.
    const snapToDynasty = slug => {
      dynastySelectEl.value = slug;
      activeFilters = new Set(['dynasty:' + slug]);
      redraw(activeFilters);
      document.querySelectorAll('.dynasty-card').forEach(c => c.classList.remove('active'));
      const card = document.querySelector(`.dynasty-card[data-slug="${slug}"]`);
      if (card) card.classList.add('active');
    };

    // selectDynasty — explicit user dynasty selection (dropdown / search / chip).
    // Snaps graph, clears person panel, scrolls dynasty card into view.
    const selectDynasty = slug => {
      snapToDynasty(slug);
      const personPanel = document.getElementById('person-panel');
      personPanel.classList.add('empty');
      personPanel.innerHTML = '';
      const card = document.querySelector(`.dynasty-card[data-slug="${slug}"]`);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    // selectPerson — person bubble / chip / search result clicked.
    // Shows person panel; snaps graph silently via snapToDynasty (not selectDynasty).
    const selectPerson = person => {
      showPersonPanel(person, selectDynasty);
      document.getElementById('person-panel').scrollIntoView({ behavior: 'smooth' });
      const primary = (person.dynasties || [])[0];
      if (primary) snapToDynasty(primary.dynasty_slug);
    };

    const redraw = f => buildGraph(graph, personsById, f, selectPerson);
    redraw(activeFilters);

    buildFilters(dynasties, persons, f => { activeFilters = f; redraw(f); }, selectDynasty);
    buildDynastyCards(dynasties, personsBySlug, selectPerson);

    // Wire up search
    buildSearch(
      persons,
      dynasties,
      personsBySlug,
      selectPerson,
      // Dynasty selected from search — snap graph
      dynasty => selectDynasty(dynasty.slug)
    );

    setTimeout(() => {
      const el = document.getElementById('loading');
      el.style.transition = 'opacity 0.4s';
      el.style.opacity    = '0';
      setTimeout(() => { el.style.display = 'none'; }, 420);
    }, 500);

  } catch (err) {
    console.error('Failed to load data:', err);
    document.getElementById('loading').innerHTML = `
      <div style="font-family:'IBM Plex Mono',monospace;color:#9b3a3a;font-size:0.8rem;text-align:center;padding:2rem">
        Error loading data. Run a local server:<br><br>
        <code>cd ~/nepo-depot/site &amp;&amp; python3 -m http.server 8080</code>
      </div>`;
  }
}

init();
</script>
